<head>

  <style>

    .step.active { color: var(--fg); font-weight: 500; } .step.active .dot { background: var(--accent); box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--accent); }
    .step-sep { color: var(--border); font-size: 12px; user-select: none; }

    .left-panel { flex: 0 0 65%; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--surface); }
    .player-area { flex: 1; display: flex; align-items: center; justify-content: center; background: oklch(6% 0.005 250); position: relative; min-height: 280px; }
    .player-area .empty-state { color: rgba(255,255,255,0.3); text-align: center; font-size: 14px; line-height: 1.6; padding: 40px; }
    .player-area .empty-state svg { width: 36px; height: 36px; margin-bottom: 10px; opacity: 0.35; fill: none; stroke: rgba(255,255,255,0.25); stroke-width: 1.5; }
    .player-area .preview-overlay { display: none; position: absolute; inset: 0; flex-direction: column; align-items: center; justify-content: center; }
    .player-area.has-clip .preview-overlay { display: flex; }
    .player-area.has-clip .empty-state { display: none; }
    .preview-label { color: rgba(255,255,255,0.45); font-size: 13px; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
    .preview-controls { display: flex; gap: 10px; }
    .preview-controls button { padding: 8px 18px; font: 500 13px var(--font-body); border-radius: 8px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.07); color: #fff; cursor: pointer; transition: background 0.12s; }
    .preview-controls button:hover { background: rgba(255,255,255,0.14); }
    .clip-info-bar { padding: 12px 24px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 13px; background: var(--bg); flex-shrink: 0; gap: 10px; }
    .clip-info-bar .tags { display: flex; gap: 6px; flex-shrink: 0; }
    .clip-info-bar .clip-title { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font: 500 12px var(--font-body); }
    .tag-type { background: oklch(93% 0.01 250); color: var(--muted); }
    .tag-rec-H { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
    .tag-rec-M { background: oklch(96% 0.02 255); color: oklch(42% 0.12 255); }
    .tag-rec-L { background: oklch(97% 0.005 250); color: var(--muted); }
    .tabs-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .tab-btn { padding: 12px 22px; font: 500 13px var(--font-body); color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: color 0.1s; }
    .tab-btn:hover { color: var(--fg); }
    .tab-btn.active { color: var(--fg); border-bottom-color: var(--accent); }
    .tab-content { flex: 1; overflow-y: auto; padding: 24px 28px; background: var(--surface); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .right-panel { flex: 0 0 35%; display: flex; flex-direction: column; background: var(--surface); overflow: hidden; min-width: 300px; }
    .right-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .right-header h2 { font: 600 14px var(--font-display); letter-spacing: -0.01em; }
    .right-header .meta { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .sort-bar { display: flex; gap: 4px; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .sort-btn { padding: 5px 12px; font: 500 12px var(--font-body); border: none; border-radius: 6px; cursor: pointer; background: none; color: var(--muted); transition: background 0.1s; }
    .sort-btn.active { background: var(--surface); color: var(--fg); box-shadow: 0 0 0 1px var(--border); }
    .candidate-list { flex: 1; overflow-y: auto; padding: 10px 14px; }
    .card { border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; cursor: pointer; background: var(--surface); transition: border-color 0.12s, box-shadow 0.12s; }
    .card:hover { border-color: var(--muted); }
    .card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .card .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .card .time { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .card .ctitle { font: 600 14px/1.3 var(--font-display); letter-spacing: -0.01em; margin-bottom: 6px; }
    .card .summary { font-size: 13px; color: var(--muted); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card.expanded .summary { -webkit-line-clamp: unset; }
    .card .quote { margin-top: 8px; font-size: 13px; color: var(--fg); font-style: italic; padding-left: 12px; border-left: 2px solid var(--border); }
    .card .actions { margin-top: 12px; display: flex; gap: 8px; }
    .card .detail { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .card.expanded .detail { display: block; }
    .action-btn { padding: 6px 14px; font: 500 12px var(--font-body); border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--fg); cursor: pointer; transition: background 0.1s; }
    .action-btn:hover { background: oklch(93% 0.005 250); }
    .action-btn.primary { background: var(--fg); color: var(--surface); border-color: var(--fg); }
    .action-btn.primary:hover { opacity: 0.85; }
    .field { margin-bottom: 12px; }
    .field .lbl { font: 500 11px var(--font-body); text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 4px; }
    .field .val { font-size: 13px; line-height: 1.5; }
    .field .titles { list-style: none; }
    .field .titles li { padding: 4px 10px; margin-bottom: 3px; border-radius: 6px; border: 1px solid var(--border); font-size: 13px; }
    .right-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
    .right-footer button { flex: 1; padding: 9px 0; font: 500 12px var(--font-body); border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--muted); cursor: pointer; transition: color 0.1s; }
    .right-footer button:hover { color: var(--fg); }
    .fg { margin-bottom: 18px; }
    .fg .lbl { font: 500 11px var(--font-body); text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 5px; }
    .fg input, .fg textarea { width: 100%; padding: 9px 12px; font: 14px/1.5 var(--font-body); border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--fg); outline: none; transition: border-color 0.12s; }
    .fg input:focus, .fg textarea:focus { border-color: var(--accent); }
    .fg textarea { resize: vertical; min-height: 56px; }
    .fg .ro { font-size: 13px; color: var(--muted); line-height: 1.5; padding: 5px 0; }
    .sub-line { display: grid; grid-template-columns: 110px 1fr; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: start; }
    .sub-line .tc { font: 12px/1.5 var(--font-mono); color: var(--muted); font-variant-numeric: tabular-nums; padding-top: 5px; }
    .sub-line textarea { width: 100%; padding: 5px 10px; font: 14px/1.5 var(--font-body); border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--fg); outline: none; resize: none; min-height: 34px; transition: border-color 0.12s; }
    .sub-line textarea:focus { border-color: var(--accent); }
    .export-section { margin-bottom: 24px; }
    .export-section .st { font: 600 14px var(--font-display); margin-bottom: 6px; }
    .export-section .desc { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 12px; }
    .export-btn { padding: 9px 22px; font: 500 13px var(--font-body); border-radius: 8px; border: none; cursor: pointer; transition: opacity 0.12s; }
    .export-btn.fg { background: var(--fg); color: var(--surface); }
    .export-btn.fg:hover { opacity: 0.85; }

    .export-btn.outline:hover { background: var(--bg); }

    .confirm-bar .confirm-actions { display: flex; gap: 8px; margin-top: 10px; }

<div class="app-shell">
  <header class="app-header">
    <div class="logo">Clip<span>wise</span></div>

  <div class="status-bar" id="progressBar"></div>
  <div class="main-layout">
    <div class="left-panel">

          <p>从右侧选择一个候选片段，开始预览和编辑。</p>
        </div>
        <div class="preview-overlay">
          <div class="preview-label">当前预览：<span id="previewTimeRange"></span> · <span id="previewDuration"></span></div>
          <div class="preview-controls">
            <button id="playSegmentBtn">▶ 播放该片段</button>
            <button id="replayBtn">↺ 从头播放</button>
          </div>
        </div>
      </div>
      <div class="clip-info-bar">
        <div class="tags" id="clipTags"></div>
        <div class="clip-title" id="clipTitle"></div>
      </div>
      <div class="tabs-bar" id="tabsBar">
        <button class="tab-btn active" data-tab="copy">文案</button>
        <button class="tab-btn" data-tab="subtitle">字幕</button>
        <button class="tab-btn" data-tab="export">导出</button>
      </div>
      <div class="tab-content">
        <div class="tab-pane active" id="tabCopy">
          <p style="color:var(--muted);font-size:13px;margin-bottom:14px;" id="copyEmpty">选择一个候选片段后即可编辑文案。</p>
          <div id="copyFields" style="display:none;">
            <div class="fg"><div class="lbl">标题 1</div><input type="text" id="t1" /></div>
            <div class="fg"><div class="lbl">标题 2</div><input type="text" id="t2" /></div>
            <div class="fg"><div class="lbl">标题 3</div><input type="text" id="t3" /></div>
            <div class="fg"><div class="lbl">摘要</div><textarea id="summaryField"></textarea></div>
            <div class="fg"><div class="lbl">原文金句</div><textarea id="quoteField"></textarea></div>
            <div class="fg"><div class="lbl">推荐理由</div><div class="ro" id="reasonField"></div></div>
            <div class="fg"><div class="lbl">风险提示</div><div class="ro" id="riskField"></div></div>
          </div>
        </div>
        <div class="tab-pane" id="tabSubtitle">
          <p style="color:var(--muted);font-size:13px;margin-bottom:14px;" id="subEmpty">选择一个候选片段后即可编辑字幕。</p>
          <div id="subFields" style="display:none;"></div>
        </div>
        <div class="tab-pane" id="tabExport">
          <div class="confirm-bar" id="exportConfirm">
            建议先预览片段，确认开头和结尾没有问题。
            <div class="confirm-actions">
              <button class="btn-continue" id="confirmContinue">继续导出</button>
              <button class="btn-preview" id="confirmPreview">先预览</button>
            </div>
          </div>
          <p style="color:var(--muted);font-size:13px;margin-bottom:18px;" id="exportEmpty">选择一个候选片段后即可导出。</p>
          <div id="exportFields" style="display:none;">
            <div class="export-section">
              <div class="st">快速导出当前片段</div>
              <div class="desc">MP4 + SRT + TXT，在浏览器本地生成，原视频不上传。</div>
              <button class="export-btn fg" id="quickExportBtn">快速导出当前片段</button>
            </div>
            <div class="export-section">
              <div class="st">批量快速导出 TOP 5</div>
              <div class="desc">ZIP 包含 5 个 MP4、5 个 SRT、5 个 TXT。</div>
              <button class="export-btn outline" id="batchExportBtn">批量快速导出 TOP 5</button>
            </div>
            <div class="export-section">
              <div class="st">生成带字幕视频</div>
              <div class="desc">本地切出短片后上传服务器烧录字幕。原始完整回放不会上传。</div>
              <button class="export-btn outline" id="subExportBtn">生成带字幕视频</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="right-panel">
      <div class="right-header">
        <h2>候选片段</h2>
        <span class="meta" id="candidateCount"></span>
      </div>
      <div class="sort-bar">
        <button class="sort-btn active" data-sort="rank">推荐优先</button>
        <button class="sort-btn" data-sort="time">按时间顺序</button>
      </div>
      <div class="candidate-list" id="candidateList"></div>
      <div class="right-footer">
        <button id="showMoreBtn">查看更多候选</button>
        <button id="regenerateBtn">重新生成候选</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

  var sel = null, expanded = null, sortMode = 'rank', showAll = false, exporting = false;
  var previewedClips = {}, pendingExport = null;
  var $ = function(id) { return document.getElementById(id); };
  function recCls(l) { return l==='强推荐'?'tag-rec-H':l==='推荐'?'tag-rec-M':'tag-rec-L'; }
  function toast(m) { var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2500); }
  function find(id) { return FULL.find(function(c) { return c.id===id; }); }
  function sorted() { var l=showAll?FULL.slice():CANDIDATES.slice();if(sortMode==='time')l.sort(function(a,b){return a.start.localeCompare(b.start);});else l.sort(function(a,b){return a.rank-b.rank;});return l; }

  (function(){var s=[{l:'选择回放',d:1},{l:'分析内容',d:1},{l:'生成候选',d:1},{l:'预览确认',a:1},{l:'导出素材'}];var h='';s.forEach(function(x,i){if(i)h+='<span class="step-sep">·</span>';h+='<span class="step'+(x.d?' done':'')+(x.a?' active':'')+'"><span class="dot"></span>'+x.l+'</span>';});$('progressBar').innerHTML=h;})();

  function resetLeft() {
    $('playerArea').classList.remove('has-clip'); $('clipTags').innerHTML=''; $('clipTitle').textContent='';
    $('copyEmpty').style.display='block'; $('copyFields').style.display='none';
    $('subEmpty').style.display='block'; $('subFields').style.display='none';
    $('exportEmpty').style.display='block'; $('exportFields').style.display='none'; $('exportConfirm').classList.remove('visible');
    ['quickExportBtn','batchExportBtn','subExportBtn'].forEach(function(x){if($[x])$[x].disabled=true;});
  }

  function fillLeftPanel(c) {
    $('playerArea').classList.add('has-clip'); $('previewTimeRange').textContent=c.start+' - '+c.end; $('previewDuration').textContent=c.dur;
    $('clipTags').innerHTML='<span class="tag tag-type">'+c.type+'</span><span class="tag '+recCls(c.recLabel)+'">'+c.recLabel+'</span>'; $('clipTitle').textContent=c.title;
    $('copyEmpty').style.display='none'; $('copyFields').style.display='block';
    $('t1').value=c.titles[0]||''; $('t2').value=c.titles[1]||''; $('t3').value=c.titles[2]||''; $('summaryField').value=c.summary; $('quoteField').value=c.quote;
    $('reasonField').textContent=c.reason; $('riskField').textContent=c.risk;
    $('subEmpty').style.display='none'; $('subFields').style.display='block';
    var sh='';c.subs.forEach(function(s,i){var t=s.et||s.text;sh+='<div class="sub-line"><span class="tc">'+s.t+' - '+s.e+'</span><textarea data-idx="'+i+'">'+t+'</textarea></div>';});
    $('subFields').innerHTML=sh;
    $('exportEmpty').style.display='none'; $('exportFields').style.display='block'; $('exportConfirm').classList.remove('visible');
    ['quickExportBtn','batchExportBtn','subExportBtn'].forEach(function(x){if($[x])$[x].disabled=false;});
  }

  function renderCards() {
    var l=sorted(); $('candidateCount').textContent=l.length+' / '+FULL.length+' 个候选'; var h='';
    l.forEach(function(c){
      var s=sel===c.id?' selected':'', e=expanded===c.id?' expanded':'', isExpanded=expanded===c.id;
      h+='<div class="card'+s+e+'" data-id="'+c.id+'">';
      h+='<div class="top"><span class="tags"><span class="tag tag-type">'+c.type+'</span><span class="tag '+recCls(c.recLabel)+'">'+c.recLabel+'</span></span><span class="time">'+c.start+' - '+c.end+' · '+c.dur+'</span></div>';
      h+='<div class="ctitle">'+c.title+'</div><div class="summary">'+c.summary+'</div><div class="quote">'+c.quote+'</div>';
      h+='<div class="actions"><button class="action-btn primary" data-action="preview" data-id="'+c.id+'">预览片段</button>';

      h+='</div><div class="detail">';
      h+='<div class="field"><div class="lbl">标题候选</div><div class="val"><ul class="titles">';

      h+='<div class="actions"><button class="action-btn primary" data-action="quickExport" data-id="'+c.id+'">快速导出</button><button class="action-btn" data-action="subExport" data-id="'+c.id+'">生成带字幕视频</button><button class="action-btn" data-action="collapse" data-id="'+c.id+'">收起详情</button></div></div></div>';
    });
    $('candidateList').innerHTML=h;
  }

  function previewClip(id) { var c=find(id);if(!c)return;sel=id;expanded=null;previewedClips[id]=true;renderCards();fillLeftPanel(c);document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});document.querySelector('.tab-btn[data-tab="copy"]').classList.add('active');document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active');});$('tabCopy').classList.add('active');toast('已选中片段 · 左侧播放器跳到 '+c.start); }

  function requestExport(id,type) {
    if(previewedClips[id]){executeExport(id,type);return;}
    pendingExport={id:id,type:type};if(sel!==id){var c=find(id);if(c){sel=id;expanded=null;fillLeftPanel(c);}}
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});document.querySelector('.tab-btn[data-tab="export"]').classList.add('active');document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active');});$('tabExport').classList.add('active');$('exportConfirm').classList.add('visible');$('exportEmpty').style.display='none';$('exportFields').style.display='block';['quickExportBtn','batchExportBtn','subExportBtn'].forEach(function(x){if($[x])$[x].disabled=true;});
  }

  function executeExport(id,type){if(exporting)return;$('exportConfirm').classList.remove('visible');['quickExportBtn','batchExportBtn','subExportBtn'].forEach(function(x){if($[x])$[x].disabled=false;});if(type==='quick')doQuickExport(id);else if(type==='batch')doBatchExport();else if(type==='sub')doSubtitledExport(id);pendingExport=null;}

  function doQuickExport(id){if(exporting)return;var c=find(id);if(!c)return;exporting=true;$('quickExportBtn').disabled=true;$('quickExportBtn').textContent='正在本地生成…';toast('正在本地生成 · 请保持页面打开');setTimeout(function(){exporting=false;$('quickExportBtn').disabled=false;$('quickExportBtn').textContent='快速导出当前片段';toast('导出完成 — clip-'+c.rank+'.mp4 / .srt / .txt');},2500);}

  function doBatchExport(){if(exporting)return;exporting=true;$('batchExportBtn').disabled=true;var o=$('batchExportBtn').textContent;$('batchExportBtn').textContent='正在本地生成…';toast('正在本地生成 TOP 5 素材包 · 请保持页面打开');setTimeout(function(){exporting=false;$('batchExportBtn').disabled=false;$('batchExportBtn').textContent=o;toast('导出完成 — project-xxx-top5.zip 已就绪');},3500);}

  function doSubtitledExport(id){if(exporting||!find(id))return;exporting=true;$('subExportBtn').disabled=true;var o=$('subExportBtn').textContent;$('subExportBtn').textContent='正在上传短片…';toast('正在上传当前短片用于字幕烧录 · 原始回放不会上传');setTimeout(function(){$('subExportBtn').textContent='正在烧录字幕…';setTimeout(function(){exporting=false;$('subExportBtn').disabled=false;$('subExportBtn').textContent=o;toast('导出完成 — 带字幕视频已就绪');},2000);},1500);}

  $('candidateList').addEventListener('click',function(e){var b=e.target.closest('button'),c=e.target.closest('.card');if(!b&&!c)return;var id;if(b){id=b.dataset.id;var a=b.dataset.action;if(a==='preview'){previewClip(id);return;}if(a==='expand'){expanded=id;renderCards();return;}if(a==='collapse'){expanded=null;renderCards();return;}if(a==='quickExport'){requestExport(id,'quick');return;}if(a==='subExport'){requestExport(id,'sub');return;}}if(c&&!b){id=c.dataset.id;previewClip(id);}});

  $('confirmContinue').addEventListener('click',function(){if(pendingExport)executeExport(pendingExport.id,pendingExport.type);});
  $('confirmPreview').addEventListener('click',function(){$('exportConfirm').classList.remove('visible');['quickExportBtn','batchExportBtn','subExportBtn'].forEach(function(x){if($[x])$[x].disabled=false;});if(pendingExport){previewedClips[pendingExport.id]=true;document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});document.querySelector('.tab-btn[data-tab="copy"]').classList.add('active');document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active');});$('tabCopy').classList.add('active');toast('请预览片段，确认后回到导出 Tab 导出');}pendingExport=null;});

  document.querySelector('.sort-bar').addEventListener('click',function(e){var b=e.target.closest('.sort-btn');if(!b)return;sortMode=b.dataset.sort;document.querySelectorAll('.sort-btn').forEach(function(x){x.classList.remove('active');});b.classList.add('active');renderCards();});

  $('tabsBar').addEventListener('click',function(e){var b=e.target.closest('.tab-btn');if(!b)return;var t=b.dataset.tab;document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active');});b.classList.add('active');document.querySelectorAll('.tab-pane').forEach(function(x){x.classList.remove('active');});$(t==='copy'?'tabCopy':t==='subtitle'?'tabSubtitle':'tabExport').classList.add('active');});

  $('subExportBtn').addEventListener('click',function(){if(sel)requestExport(sel,'sub');});

  $('playSegmentBtn').addEventListener('click',function(){if(sel)toast('▶ 播放 '+find(sel).start+' - '+find(sel).end);});

  $('showMoreBtn').addEventListener('click',function(){showAll=!showAll;$('showMoreBtn').textContent=showAll?'收起多余候选':'查看更多候选';toast(showAll?'已显示全部 '+FULL.length+' 个候选':'已收起多余候选');renderCards();});
